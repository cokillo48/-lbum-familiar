<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Familiar</title>
    <style>
        /* ESTILOS GLOBALES */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4eae1;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #4a3b32;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* PANTALLA DE INGRESO (LOGIN) */
        .login-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 5px solid #5c4a3c;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            margin-top: 50px;
        }

        .login-container h2 {
            color: #5c4a3c;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #7a6b5e;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #dcdcdc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }

        .input-group input:focus {
            border-color: #7a6b5e;
            outline: none;
        }

        .error-msg {
            color: #c94c4c;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
        }

        /* CONTENEDOR DEL LIBRO (OCULTO AL INICIO) */
        .album-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .book-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            border: 10px solid #5c4a3c;
            overflow: hidden;
            position: relative;
        }

        /* CADA HOJA INDIVIDUAL */
        .sheet {
            flex: 1;
            padding: 25px;
            box-sizing: border-box;
            background: linear-gradient(to right, #ffffff 94%, #eaeaea 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .sheet-right {
            background: linear-gradient(to left, #ffffff 94%, #eaeaea 100%);
            border-left: 2px solid #dcdcdc;
        }

        .photo-frame {
            width: 100%;
            max-width: 420px;
            height: 380px;
            border: 15px solid #fff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 2px;
            transition: transform 0.3s;
        }

        .photo-frame:hover {
            transform: scale(1.02);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .page-number {
            margin-top: 15px;
            font-size: 0.95em;
            color: #7a6b5e;
            font-weight: bold;
        }

        /* NAVEGACIÓN */
        .navigation {
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background-color: #7a6b5e;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: #5c4a3c;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .counter {
            font-size: 1.1em;
            font-weight: bold;
            color: #5c4a3c;
            min-width: 140px;
            text-align: center;
        }

        .welcome-user {
            font-style: italic;
            color: #7a6b5e;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>📸 Nuestro Álbum Familiar</h1>

    <!-- FORMULARIO DE INGRESO -->
    <div class="login-container" id="login-box">
        <h2>Ingresar al Álbum</h2>
        <p style="color: #7a6b5e; font-size: 0.9em; margin-bottom: 20px;">Por favor introduce tu nombre de usuario para ver los recuerdos familiares.</p>
        
        <div class="input-group">
            <label for="username">Usuario:</label>
            <input type="text" id="username" placeholder="Ej: Fabiola, Luis, Jorge.S...">
        </div>
        
        <div class="error-msg" id="error-message">Usuario no registrado o incorrecto</div>
        
        <button class="btn" style="width: 100%;" onclick="validarIngreso()">Entrar</button>
    </div>

    <!-- CONTENIDO DEL ÁLBUM (OCULTO HASTA LOGUEARSE) -->
    <div class="album-content" id="album-content">
        <div class="welcome-user" id="welcome-text">¡Bienvenido de vuelta!</div>
        
        <div class="book-container">
            <!-- LADO IZQUIERDO -->
            <div class="sheet">
                <div class="photo-frame">
                    <img id="img-left" src="foto1.jpg" alt="Foto Izquierda" onerror="this.src='https://via.placeholder.com/420x380?text=Espacio+para+Foto'">
                </div>
                <div class="page-number" id="page-num-left">Foto 1</div>
            </div>

            <!-- LADO DERECHO -->
            <div class="sheet sheet-right">
                <div class="photo-frame">
                    <img id="img-right" src="foto2.jpg" alt="Foto Derecha" onerror="this.src='https://via.placeholder.com/420x380?text=Espacio+para+Foto'">
                </div>
                <div class="page-number" id="page-num-right">Foto 2</div>
            </div>
        </div>

        <!-- CONTROLES INFERIORES -->
        <div class="navigation">
            <button class="btn" id="btn-prev" onclick="navegar(-1)">◀ Anterior</button>
            <span class="counter" id="sheet-counter">Hoja 1 de 500</span>
            <button class="btn" id="btn-next" onclick="navegar(1)">Siguiente ▶</button>
        </div>
    </div>

    <script>
        // LISTA DE USUARIOS PERMITIDOS (Incluyendo a tu papá Jorge.S)
        const usuariosPermitidos = ["jorge", "jorge.s", "fabiola", "luis", "hortencia", "amelia"];

        // Configuración de las fotos (1000 fotos = 500 hojas)
        const TOTAL_FOTOS = 1000; 
        const TOTAL_HOJAS = 500; 
        let hojaActual = 1; 

        function validarIngreso() {
            const inputUser = document.getElementById('username').value.trim().toLowerCase();
            const errorMsg = document.getElementById('error-message');

            if (usuariosPermitidos.includes(inputUser)) {
                // Ocultar login y mostrar álbum
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('album-content').style.display = 'flex';
                
                // Formatear el nombre para el saludo en pantalla
                let nombreMostrado = inputUser === "jorge.s" ? "Jorge Salomón" : inputUser.charAt(0).toUpperCase() + inputUser.slice(1);
                document.getElementById('welcome-text').innerText = `¡Hola, qué alegría tenerte aquí ${nombreMostrado}! Disfruta el álbum.`;
                
                actualizarAlbum();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function actualizarAlbum() {
            let fotoIzquierda = (hojaActual * 2) - 1;
            let fotoDerecha = hojaActual * 2;

            const imgLeft = document.getElementById('img-left');
            const imgRight = document.getElementById('img-right');
            const txtLeft = document.getElementById('page-num-left');
            const txtRight = document.getElementById('page-num-right');
            const sheetCounter = document.getElementById('sheet-counter');

            imgLeft.src = `foto${fotoIzquierda}.jpg`;
            imgRight.src = `foto${fotoDerecha}.jpg`;

            txtLeft.innerText = `Foto ${fotoIzquierda}`;
            txtRight.innerText = `Foto ${fotoDerecha}`;

            sheetCounter.innerText = `Hoja ${hojaActual} de ${TOTAL_HOJAS}`;

            document.getElementById('btn-prev').disabled = (hojaActual === 1);
            document.getElementById('btn-next').disabled = (hojaActual === TOTAL_HOJAS);
        }

        function navegar(direccion) {
            let nuevaHoja = hojaActual + direccion;
            if (nuevaHoja >= 1 && nuevaHoja <= TOTAL_HOJAS) {
                hojaActual = nuevaHoja;
                actualizarAlbum();
            }
        }
    </script>

</body>
</html>
